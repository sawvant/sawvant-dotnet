openapi: 3.1.0
info:
  contact:
    name: Sawvant
    url: https://sawvant.com
  description: |
    REST API for 2D guillotine sheet cutting optimization.
    Submit optimization jobs, poll for status, or stream progress via SSE.
  title: Sawvant Cutting Optimization API
  version: 1.0.0
servers:
- description: Production
  url: https://api.sawvant.com
security:
- apiKey: []
paths:
  /health:
    get:
      operationId: getHealth
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
          description: Service is healthy
      security: []
      summary: Health check
      tags:
      - System
  /v1/tiers:
    get:
      description: |
        Returns all available subscription tiers with their rate limits, pricing,
        and feature gates. This is the single source of truth for tier configuration.
      operationId: listTiers
      responses:
        "200":
          content:
            application/json:
              schema:
                items:
                  $ref: '#/components/schemas/TierDefinition'
                type: array
          description: List of tier definitions
      security: []
      summary: List available subscription tiers
      tags:
      - System
  /v1/optimize:
    post:
      description: |
        Validates the request synchronously, then enqueues the job for async processing.
        Returns 202 with a job ID and URLs for polling/streaming.
      operationId: createOptimization
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OptimizeRequest'
        required: true
      responses:
        "202":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OptimizeAccepted'
          description: Job accepted and queued
        "400":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
          description: "Invalid request (malformed JSON, missing fields, validation\
            \ error)"
        "401":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
          description: Missing or invalid API key
        "403":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
          description: API key revoked
        "422":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
          description: Request is valid but infeasible (e.g. part larger than all
            sheets)
        "429":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RateLimitError'
          description: Rate limit exceeded
      summary: Submit a cutting optimization job
      tags:
      - Optimization
  /v1/jobs/{id}:
    get:
      description: "Returns the current state of a job including progress, result,\
        \ and errors."
      operationId: getJob
      parameters:
      - $ref: '#/components/parameters/JobID'
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JobResponse'
          description: Job found
        "400":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
          description: Invalid job ID format
        "401":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
          description: Missing or invalid API key
        "404":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
          description: Job not found
      summary: Get job status
      tags:
      - Jobs
  /v1/jobs/{id}/stream:
    get:
      description: |
        Server-Sent Events stream that emits `progress`, `completed`, or `failed` events.
        The stream closes automatically when the job reaches a terminal state.

        A `: heartbeat` comment is sent every 30 seconds to keep the connection alive
        through proxies and load balancers. SSE clients ignore these automatically.
      operationId: streamJob
      parameters:
      - $ref: '#/components/parameters/JobID'
      responses:
        "200":
          content:
            text/event-stream:
              schema:
                description: |
                  SSE events with `event:` and `data:` fields.
                  Event types: `progress`, `completed`, `failed`, `error`.
                  Data is a JSON-encoded JobResponse.
                type: string
          description: SSE event stream
        "400":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
          description: Invalid job ID format
        "401":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
          description: Missing or invalid API key
        "404":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
          description: Job not found
      summary: Stream job progress via SSE
      tags:
      - Jobs
components:
  parameters:
    JobID:
      description: Job UUID
      explode: false
      in: path
      name: id
      required: true
      schema:
        format: uuid
        type: string
      style: simple
  schemas:
    TierDefinition:
      example:
        features:
          sse: true
          thorough: true
          metrics: true
          cost: true
        period: month
        price_eur_cents: 3900
        rate_limit_fast: 100
        name: pro
        rate_limit_thorough: 20
        display_name: Pro
      properties:
        name:
          example: pro
          type: string
        display_name:
          example: Pro
          type: string
        price_eur_cents:
          example: 3900
          type: integer
        period:
          example: month
          type: string
        rate_limit_fast:
          description: Maximum fast strategy requests per 24h sliding window
          example: 100
          type: integer
        rate_limit_thorough:
          description: Maximum thorough strategy requests per 24h sliding window
          example: 20
          type: integer
        features:
          additionalProperties:
            type: boolean
          description: Feature gates enabled for this tier
          example:
            sse: true
            thorough: true
            metrics: true
            cost: true
      required:
      - display_name
      - features
      - name
      - price_eur_cents
      - rate_limit_fast
      - rate_limit_thorough
    HealthResponse:
      example:
        status: ok
      properties:
        status:
          example: ok
          type: string
      required:
      - status
    Error:
      example:
        error: error
      properties:
        error:
          type: string
      required:
      - error
    RateLimitError:
      example:
        limit: 0
        error: rate limit exceeded
        strategy: fast
        remaining: 6
      properties:
        error:
          example: rate limit exceeded
          type: string
        limit:
          description: Request limit for this tier and strategy (24h sliding window)
          type: integer
        remaining:
          description: Remaining requests in the current window
          type: integer
        strategy:
          description: Which strategy quota was exceeded
          enum:
          - fast
          - thorough
          type: string
      required:
      - error
      - limit
      - remaining
      - strategy
